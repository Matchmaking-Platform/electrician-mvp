services:
  db:
    image: postgres:16-alpine
    container_name: electrician-mvp-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: electrician_mvp
    ports:
      - "5432:5432"
    volumes:
      - electrician_mvp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d electrician_mvp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  electrician_mvp_pgdata:
    name: electrician_mvp_pgdata
